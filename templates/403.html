{% extends "base.html" %}

{% block title %}Access Denied — CampusPrep{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center px-4 py-12 relative">
    <!-- Background gradient -->
    <div class="absolute inset-0 -z-10">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,rgba(168,85,247,0.12),transparent)] dark:bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,rgba(168,85,247,0.08),transparent)]"></div>
    </div>

    <div class="text-center max-w-md">
        <!-- Error Icon -->
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 bg-purple-100 dark:bg-purple-950/30 rounded-3xl flex items-center justify-center">
                <svg class="w-12 h-12 text-purple-600 dark:text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
        </div>

        <!-- Error Code -->
        <h1 class="text-7xl font-black mb-4 text-purple-600 dark:text-purple-500">
            403
        </h1>

        <!-- Error Message -->
        <h2 class="text-3xl font-bold mb-3 text-foreground">Access Denied</h2>
        <p class="text-muted-foreground mb-8 leading-relaxed text-lg">
            You don't have permission to access this resource. If you think this is a mistake, contact us for assistance.
        </p>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="px-8 py-3 bg-primary text-primary-foreground font-semibold rounded-lg hover:opacity-90 transition-opacity active:scale-95">
                Go Home
            </a>
            <a href="javascript:history.back()" class="px-8 py-3 border border-border bg-secondary text-foreground font-semibold rounded-lg hover:bg-secondary/80 transition-colors active:scale-95">
                Go Back
            </a>
        </div>

        <!-- Help Text -->
        <p class="mt-8 text-sm text-muted-foreground">
            Need help? <a href="mailto:support@campusprep.in" class="text-primary hover:underline font-medium">Contact support</a>
        </p>
    </div>
</div>
{% endblock %}

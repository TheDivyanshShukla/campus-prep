{% extends "base.html" %}

{% block title %}Page Not Found — CampusPrep{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center px-4 py-12 relative">
    <!-- Background gradient -->
    <div class="absolute inset-0 -z-10">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,rgba(99,102,241,0.12),transparent)] dark:bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,rgba(99,102,241,0.08),transparent)]"></div>
    </div>

    <div class="text-center max-w-md">
        <!-- Error Icon -->
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 bg-primary/10 dark:bg-primary/20 rounded-3xl flex items-center justify-center">
                <svg class="w-12 h-12 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>

        <!-- Error Code -->
        <h1 class="text-7xl font-black mb-4 bg-gradient-to-r from-primary to-primary/60 dark:from-blue-400 dark:to-blue-500 bg-clip-text text-transparent">
            404
        </h1>

        <!-- Error Message -->
        <h2 class="text-3xl font-bold mb-3 text-foreground">Page Not Found</h2>
        <p class="text-muted-foreground mb-8 leading-relaxed text-lg">
            The page you're looking for doesn't exist or has been moved. Let's get you back on track.
        </p>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="px-8 py-3 bg-primary text-primary-foreground font-semibold rounded-lg hover:opacity-90 transition-opacity active:scale-95">
                Go Home
            </a>
            <a href="javascript:history.back()" class="px-8 py-3 border border-border bg-secondary text-foreground font-semibold rounded-lg hover:bg-secondary/80 transition-colors active:scale-95">
                Go Back
            </a>
        </div>

        <!-- Help Text -->
        <p class="mt-8 text-sm text-muted-foreground">
            Need help? <a href="mailto:support@campusprep.in" class="text-primary hover:underline font-medium">Contact support</a>
        </p>
    </div>
</div>
{% endblock %}

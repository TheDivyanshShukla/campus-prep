{% extends "base.html" %}

{% block title %}Password Updated — CampusPrep{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12">
    <div class="pointer-events-none fixed inset-0 -z-10">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,rgba(99,102,241,0.12),transparent)] dark:bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,rgba(99,102,241,0.08),transparent)]"></div>
    </div>

    <div class="w-full max-w-md text-center">
        <a href="{% url 'home' %}" class="inline-block text-2xl font-extrabold tracking-tight">
            Campus<span class="text-blue-600 dark:text-blue-400">Prep</span>
        </a>

        <div class="mt-8 bg-white dark:bg-zinc-950 border border-border rounded-2xl shadow-xl shadow-black/5 dark:shadow-none p-10 space-y-4">
            <div class="w-16 h-16 mx-auto bg-green-100 dark:bg-green-900/30 rounded-2xl flex items-center justify-center">
                <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-foreground">Password updated!</h1>
            <p class="text-sm text-muted-foreground">Your password has been changed successfully. You can now sign in with your new password.</p>
            <a href="{% url 'account_login' %}"
               class="inline-block mt-2 w-full h-11 leading-[2.75rem] bg-primary text-primary-foreground hover:bg-primary/90 rounded-xl text-sm font-bold transition-all shadow-md active:scale-[0.98]">
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}

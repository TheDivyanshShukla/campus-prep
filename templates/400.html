{% extends "base.html" %}

{% block title %}Bad Request — CampusPrep{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center px-4 py-12 relative">
    <!-- Background gradient -->
    <div class="absolute inset-0 -z-10">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,rgba(234,179,8,0.12),transparent)] dark:bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,rgba(234,179,8,0.08),transparent)]"></div>
    </div>

    <div class="text-center max-w-md">
        <!-- Error Icon -->
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 bg-yellow-100 dark:bg-yellow-950/30 rounded-3xl flex items-center justify-center">
                <svg class="w-12 h-12 text-yellow-600 dark:text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4v2m0 4v2M7.5 7H6a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1V8a1 1 0 00-1-1h-1.5M9 5h6" />
                </svg>
            </div>
        </div>

        <!-- Error Code -->
        <h1 class="text-7xl font-black mb-4 text-yellow-600 dark:text-yellow-500">
            400
        </h1>

        <!-- Error Message -->
        <h2 class="text-3xl font-bold mb-3 text-foreground">Bad Request</h2>
        <p class="text-muted-foreground mb-8 leading-relaxed text-lg">
            The request couldn't be processed due to invalid parameters. Please check your input and try again.
        </p>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="px-8 py-3 bg-primary text-primary-foreground font-semibold rounded-lg hover:opacity-90 transition-opacity active:scale-95">
                Go Home
            </a>
            <a href="javascript:history.back()" class="px-8 py-3 border border-border bg-secondary text-foreground font-semibold rounded-lg hover:bg-secondary/80 transition-colors active:scale-95">
                Go Back
            </a>
        </div>

        <!-- Help Text -->
        <p class="mt-8 text-sm text-muted-foreground">
            Still having issues? <a href="mailto:support@campusprep.in" class="text-primary hover:underline font-medium">Contact support</a>
        </p>
    </div>
</div>
{% endblock %}

{# Partial: _reader_toolbar.html #}
{# Toolbar collapse/expand, zoom controls, page navigation (scrollToPage), and back-to-top button logic. #}
{# Include AFTER the DOM elements are declared (bottom of body / scripts block). #}
<script>
    // ---------- Toolbar Collapse / Expand ----------

    function collapseHeader() {
        const header = document.getElementById('stickyHeader');
        const toggleBtn = document.getElementById('headerToggleBtn');
        header.style.overflow = 'hidden';
        header.style.height = '0px';
        header.style.paddingTop = '0px';
        header.style.paddingBottom = '0px';
        header.style.marginBottom = '0px';
        header.style.borderBottomWidth = '0px';
        header.style.opacity = '0';
        header.style.pointerEvents = 'none';
        toggleBtn.style.transform = 'translateY(0)';
        toggleBtn.style.opacity = '1';
        toggleBtn.style.pointerEvents = 'auto';
    }

    function expandHeader() {
        const header = document.getElementById('stickyHeader');
        const toggleBtn = document.getElementById('headerToggleBtn');
        header.style.height = 'auto';
        header.style.paddingTop = '';
        header.style.paddingBottom = '';
        header.style.marginBottom = '';
        header.style.borderBottomWidth = '';
        header.style.opacity = '1';
        header.style.overflow = '';
        header.style.pointerEvents = '';
        toggleBtn.style.transform = '';
        toggleBtn.style.opacity = '0';
        toggleBtn.style.pointerEvents = 'none';
    }

    // ---------- Zoom Controls ----------

    window.currentZoom = 100;

    function applyZoom() {
        document.getElementById('zoomPercentage').innerText = window.currentZoom + '%';
        
        // Also update menu zoom percentage if it exists
        const zoomMenuEl = document.getElementById('zoomPercentageMenu');
        if (zoomMenuEl) {
            zoomMenuEl.innerText = window.currentZoom + '%';
        }
        
        const isZoomed = window.currentZoom > 100;
        
        // Handle PDF Container
        const pdfContainer = document.getElementById('pdf-container');
        if (pdfContainer) {
            pdfContainer.style.width = window.currentZoom + '%';
            pdfContainer.style.margin = '0 auto';
            
            // Enable horizontal scroll on zoomed state
            const pdfWrapper = pdfContainer.parentElement;
            if (pdfWrapper) {
                pdfWrapper.style.overflowX = isZoomed ? 'auto' : 'hidden';
                pdfWrapper.style.overflowY = 'visible';
                pdfWrapper.style.WebkitOverflowScrolling = 'touch'; // Smooth scroll on iOS
            }
        }

        // Target PDF canvases
        document.querySelectorAll('#pdf-container canvas').forEach(c => {
            c.style.width = '100%';
            c.style.display = 'block';
        });

        // Target Native Mode container
        const nativeContainer = document.getElementById('secure-content-container');
        if (nativeContainer) {
            nativeContainer.style.width = window.currentZoom + '%';
            nativeContainer.style.margin = '0 auto'; // Keep it centered
            
            // Enable horizontal scroll on zoomed state
            const nativeWrapper = nativeContainer.parentElement;
            if (nativeWrapper) {
                nativeWrapper.style.overflowX = isZoomed ? 'auto' : 'hidden';
                nativeWrapper.style.overflowY = 'visible';
                nativeWrapper.style.WebkitOverflowScrolling = 'touch'; // Smooth scroll on iOS
            }
        }
    }

    function zoomIn() {
        if (window.currentZoom < 250) { window.currentZoom += 25; applyZoom(); }
    }

    function zoomOut() {
        if (window.currentZoom > 50) { window.currentZoom -= 25; applyZoom(); }
    }

    // ---------- Page Navigation ----------

    function scrollToPage(pageNum) {
        pageNum = parseInt(pageNum);
        if (!pageNum || !window.pdfDocGlobal) return;
        if (pageNum < 1) pageNum = 1;
        if (pageNum > window.pdfDocGlobal.numPages) pageNum = window.pdfDocGlobal.numPages;
        const canvas = document.getElementById(`page-canvas-${pageNum}`);
        if (canvas) {
            canvas.scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.getElementById('pageNavInput').value = pageNum;
            document.getElementById('pageNavInput').blur();
        }
    }

    // ---------- Cinema Mode (In-page Full Screen) ----------
    
    function toggleCinemaMode() {
        const body = document.body;
        const mainContainer = document.getElementById('reader-main-container');
        const cinemaStatusEl = document.getElementById('cinemaStatus');
        
        body.classList.toggle('cinema-mode');
        
        if (body.classList.contains('cinema-mode')) {
            mainContainer.classList.remove('max-w-4xl');
            mainContainer.classList.add('max-w-none');
            document.getElementById('cinemaModeIcon').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 4H5a2 2 0 00-2 2v4m0 0a2 2 0 002 2h4m0 0V4m0 8a2 2 0 00-2-2H5m16 0h4a2 2 0 012 2v4m0 0a2 2 0 01-2 2h-4m0 0v-8m0 8a2 2 0 01-2-2h-4m16-4h-4a2 2 0 01-2-2v-4"></path>';
            if (cinemaStatusEl) {
                cinemaStatusEl.innerText = 'ON';
            }
        } else {
            mainContainer.classList.add('max-w-4xl');
            mainContainer.classList.remove('max-w-none');
            document.getElementById('cinemaModeIcon').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>';
            if (cinemaStatusEl) {
                cinemaStatusEl.innerText = 'OFF';
            }
        }
        
        // Retrigger zoom apply to fix any canvas sizing issues
        if (typeof applyZoom === 'function') applyZoom();
    }

    // ---------- Options Menu Toggle ----------

    function toggleOptionsMenu() {
        const menu = document.getElementById('optionsMenu');
        menu.classList.toggle('hidden');
        menu.classList.toggle('opacity-0');
        menu.classList.toggle('pointer-events-none');
        
        // Close when clicking outside
        if (!menu.classList.contains('hidden')) {
            setTimeout(() => {
                document.addEventListener('click', closeOptionsMenuOnClickOutside);
            }, 0);
        } else {
            document.removeEventListener('click', closeOptionsMenuOnClickOutside);
        }
    }

    function closeOptionsMenuOnClickOutside(e) {
        const menu = document.getElementById('optionsMenu');
        const btn = document.getElementById('optionsMenuBtn');
        
        if (!menu.contains(e.target) && !btn.contains(e.target)) {
            menu.classList.add('hidden', 'opacity-0', 'pointer-events-none');
            document.removeEventListener('click', closeOptionsMenuOnClickOutside);
        }
    }

    // ---------- Font Size Controls ----------

    window.currentFontSize = 100;

    function applyFontSize() {
        const container = document.getElementById('secure-content-container');
        if (container) {
            container.style.fontSize = window.currentFontSize + '%';
        }
        
        const fontSizeEl = document.getElementById('fontSizePercentage');
        if (fontSizeEl) {
            fontSizeEl.innerText = window.currentFontSize + '%';
        }
        
        // Also update menu font size percentage if it exists
        const fontSizeMenuEl = document.getElementById('fontSizePercentageMenu');
        if (fontSizeMenuEl) {
            fontSizeMenuEl.innerText = window.currentFontSize + '%';
        }
    }

    function fontSizeIncrease() {
        if (window.currentFontSize < 200) { window.currentFontSize += 10; applyFontSize(); }
    }

    function fontSizeDecrease() {
        if (window.currentFontSize > 80) { window.currentFontSize -= 10; applyFontSize(); }
    }

    // ---------- Eye Care Tint Toggle ----------

    function toggleTint() {
        const body = document.body;
        const btn = document.getElementById('tintToggleBtn');
        const tintStatusEl = document.getElementById('tintStatus');
        
        body.classList.toggle('tint-enabled');
        
        if (body.classList.contains('tint-enabled')) {
            if (btn) {
                btn.classList.add('bg-emerald-500/10', 'text-emerald-500', 'border-emerald-500/50');
                btn.classList.remove('bg-neutral-100', 'dark:bg-neutral-800');
            }
            if (tintStatusEl) {
                tintStatusEl.innerText = 'ON';
            }
        } else {
            if (btn) {
                btn.classList.remove('bg-emerald-500/10', 'text-emerald-500', 'border-emerald-500/50');
                btn.classList.add('bg-neutral-100', 'dark:bg-neutral-800');
            }
            if (tintStatusEl) {
                tintStatusEl.innerText = 'OFF';
            }
        }
    }

    // ---------- URL Pseudo-Slug (SEO/UX) ----------
    
    document.addEventListener('DOMContentLoaded', function() {
        // Auto-enable tint if in dark mode on load
        if (document.documentElement.classList.contains('dark')) {
            document.body.classList.add('tint-enabled');
            const btn = document.getElementById('tintToggleBtn');
            if (btn) {
                btn.classList.add('bg-emerald-500/10', 'text-emerald-500', 'border-emerald-500/50');
                btn.classList.remove('bg-neutral-100', 'dark:bg-neutral-800');
            }
            const tintStatusEl = document.getElementById('tintStatus');
            if (tintStatusEl) {
                tintStatusEl.innerText = 'ON';
            }
        }

        const docTitle = "{{ document.title|escapejs }}";
        if (!docTitle) return;

        // Sanitize title to URL-friendly slug
        const slug = docTitle.toLowerCase()
            .replace(/[^\w\s-]/g, '') // Remove non-word chars
            .trim()
            .replace(/[-\s]+/g, '-'); // Replace spaces with -

        const currentPath = window.location.pathname;
        
        // Only append if it's not already there
        if (slug && !currentPath.includes(slug)) {
            const newUrl = currentPath.endsWith('/') 
                ? `${currentPath}${slug}` 
                : `${currentPath}/${slug}`;
            
            // pushState updates the URL without reloading the page
            window.history.replaceState({ path: newUrl }, '', newUrl);
        }
    });

    // ---------- Back To Top ----------

    document.addEventListener('DOMContentLoaded', function () {
        const topBtn = document.getElementById('backToTopBtn');
        if (topBtn) {
            topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }
    });
</script>
